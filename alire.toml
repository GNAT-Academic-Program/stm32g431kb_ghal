# ----------------------------------------------------------------------------
# Clock configuration variables
#
# Naming and value sets are kept in sync with light_tasking_stm32g4xx so that
# a depending board crate can declare the same physical clocking once per
# crate, with identical keys and values on both sides.
#
# Consumers (e.g. Clock_Tree) read these via the Alire-generated
# Stm32g431_Config package.
# ----------------------------------------------------------------------------

[configuration.variables]
SYSCLK_Src = { type = "Enum",    values = ["HSI16", "HSE", "PLLRCLK"],                      default = "HSI16" }
PLL_Src    = { type = "Enum",    values = ["HSI16", "HSE"],                                 default = "HSI16" }
HSE_Hz     = { type = "Integer", first  = 0,   last = 48_000_000,                           default = 0       }
PLL_M_Div  = { type = "Integer", first  = 1,   last = 16,                                   default = 1       }
PLL_N_Mul  = { type = "Integer", first  = 8,   last = 127,                                  default = 8       }
PLL_R_Div  = { type = "Enum",    values = ["DIV2", "DIV4", "DIV6", "DIV8"],                 default = "DIV2"  }
AHB_Pre    = { type = "Enum",    values = ["DIV1", "DIV2", "DIV4", "DIV8", "DIV16",
                                           "DIV64", "DIV128", "DIV256", "DIV512"],          default = "DIV1"  }
APB1_Pre   = { type = "Enum",    values = ["DIV1", "DIV2", "DIV4", "DIV8", "DIV16"],        default = "DIV1"  }
APB2_Pre   = { type = "Enum",    values = ["DIV1", "DIV2", "DIV4", "DIV8", "DIV16"],        default = "DIV1"  }